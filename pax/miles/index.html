<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Miles</title>
  <link rel="icon" href="/favicon.ico" />
  <link rel="stylesheet" href="../../style.css" />
  <link rel="stylesheet" href="/public.css" />
  <style>
    body {
      max-width: 860px;
    }

    h1 {
      margin-bottom: 0.65rem;
    }

    h2 {
      margin: 0 0 0.75rem;
      font-size: 1.35rem;
    }

    .top-nav {
      display: flex;
      gap: 1.5rem;
      align-items: center;
      margin-bottom: 0.65rem;
      font-weight: 600;
      background: #fff;
    }

    .top-nav a {
      color: #1f3b6d;
      text-decoration: none;
    }

    .top-nav a:hover,
    .top-nav a:focus {
      text-decoration: underline;
    }

    .panel {
      border: 1px solid #d7dce8;
      border-radius: 6px;
      padding: 0.85rem;
      margin: 0.8rem 0;
      background: #fff;
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
      gap: 0.7rem;
      align-items: end;
    }

    label {
      display: grid;
      gap: 0.35rem;
      font-weight: 700;
    }

    input,
    select,
    button {
      font: inherit;
    }

    input,
    select {
      box-sizing: border-box;
      width: 100%;
      padding: 0.52rem 0.6rem;
      border: 1px solid #cfd6e5;
      border-radius: 4px;
    }

    button {
      border: 0;
      border-radius: 4px;
      background: #1f3b6d;
      color: #fff;
      padding: 0.55rem 0.8rem;
      cursor: pointer;
      font-weight: 800;
    }

    button.secondary {
      background: #eef2f9;
      color: #1f3b6d;
      border: 1px solid #cfd6e5;
    }

    button.danger {
      background: #7c241f;
    }

    button:disabled {
      opacity: 0.55;
      cursor: not-allowed;
    }

    .actions {
      display: flex;
      flex-wrap: wrap;
      gap: 0.45rem;
      align-items: center;
    }

    .entry-header {
      justify-content: space-between;
      margin-bottom: 0.7rem;
    }

    #logged-in-as {
      min-width: 0;
      overflow-wrap: anywhere;
    }

    .activity-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
      gap: 0.6rem;
      margin-top: 0.7rem;
    }

    .activity-grid label {
      background: #f8fafc;
      border: 1px solid #dfe5f0;
      border-radius: 6px;
      padding: 0.55rem;
    }

    .status {
      min-height: 1.1rem;
      color: #345;
      font-weight: 700;
    }

    .muted {
      color: #666;
      font-size: 0.93rem;
    }

    .hidden {
      display: none !important;
    }

    .daily-summary {
      background: #eef2f9;
      font-size: 0.97rem;
    }

    .daily-summary-row {
      display: flex;
      flex-wrap: wrap;
      gap: 0.25rem 1.5rem;
      align-items: baseline;
    }

    .daily-summary-row + .daily-summary-row {
      margin-top: 0.4rem;
    }

    .daily-label {
      font-weight: 700;
      white-space: nowrap;
    }

    .daily-earned {
      font-weight: 800;
      color: #1f3b6d;
    }

    .daily-breakdown {
      color: #555;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      margin-top: 0;
      table-layout: fixed;
    }

    th,
    td {
      border: 1px solid #ddd;
      padding: 0.38rem 0.45rem;
      text-align: left;
    }

    th {
      background: #d9e3f7;
      color: #1f3b6d;
    }

    .table-wrap {
      overflow-x: auto;
    }

    .date-col {
      width: 4.7rem;
    }

    .category-col,
    .miles-col {
      width: 4.6rem;
    }

    .entry-actions-col {
      width: 7.5rem;
    }

    #recent-body .actions {
      flex-wrap: nowrap;
    }

    #recent-body button {
      padding: 0.35rem 0.5rem;
      font-size: 0.9rem;
    }

    @media (max-width: 560px) {
      body {
        padding: 0.75rem;
      }

      .panel {
        padding: 0.7rem;
        margin: 0.65rem 0;
      }

      .form-grid,
      .activity-grid {
        grid-template-columns: 1fr;
      }

      .activity-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }

      th,
      td {
        padding: 0.32rem 0.35rem;
        font-size: 0.9rem;
      }

      th:nth-child(5),
      td:nth-child(5) {
        display: none;
      }

      .date-col {
        width: 3.8rem;
      }

      .category-col {
        width: 3.9rem;
      }

      .miles-col {
        width: 3.6rem;
      }

      .entry-actions-col {
        width: 6.6rem;
      }

      #recent-body button {
        padding: 0.3rem 0.4rem;
        font-size: 0.82rem;
      }
    }
  </style>
</head>
<body>
  <div id="top-nav"></div><script src="/shared/top-nav.js"></script>
  <h1>Miles</h1>

  <section id="login-panel" class="panel">
    <h2>Log In</h2>
    <form id="email-form" class="form-grid">
      <label>
        Email
        <input id="email" type="email" autocomplete="email" required />
      </label>
      <button id="request-code" type="submit">Send Code</button>
    </form>
    <div style="margin-top: 0.5rem;">
      <button id="already-have-code" class="secondary" type="button" style="font-size: 0.88rem; padding: 0.3rem 0.6rem;">Already have a code?</button>
    </div>
    <form id="code-form" class="form-grid hidden" style="margin-top: 0.85rem;">
      <label>
        Code
        <input id="code" type="text" inputmode="numeric" autocomplete="one-time-code" maxlength="6" required />
      </label>
      <button id="verify-code" type="submit">Verify</button>
    </form>
    <div id="login-status" class="status"></div>
  </section>

  <section id="entry-panel" class="panel hidden">
    <div class="actions entry-header">
      <strong id="logged-in-as"></strong>
      <button id="logout" class="secondary" type="button">Log Out</button>
    </div>

    <h2 id="form-heading">Enter Miles</h2>
    <form id="entry-form">
      <input id="entry-id" type="hidden" />
      <div class="form-grid">
        <label>
          <select id="person" aria-label="For" required></select>
        </label>
        <label>
          <input id="activity-date" aria-label="Date" type="date" required />
        </label>
      </div>
      <div class="activity-grid">
        <label>
          Run
          <input id="run-miles" data-activity="run" type="number" min="0" max="1000" step="0.01" inputmode="decimal" />
        </label>
        <label>
          Walk
          <input id="walk-miles" data-activity="walk" type="number" min="0" max="1000" step="0.01" inputmode="decimal" />
        </label>
        <label>
          Ruck
          <input id="ruck-miles" data-activity="ruck" type="number" min="0" max="1000" step="0.01" inputmode="decimal" />
        </label>
        <label>
          Bike
          <input id="bike-miles" data-activity="bike" type="number" min="0" max="1000" step="0.01" inputmode="decimal" />
        </label>
        <label>
          Swim
          <input id="swim-miles" data-activity="swim" type="number" min="0" max="1000" step="0.01" inputmode="decimal" />
        </label>
      </div>
      <div class="actions" style="margin-top: 0.65rem;">
        <button id="save-entry" type="submit">Submit Miles</button>
        <button id="cancel-edit" class="secondary hidden" type="button">Cancel Edit</button>
      </div>
      <div id="entry-status" class="status"></div>
    </form>
  </section>

  <section id="daily-summary" class="panel daily-summary hidden">
    <div id="daily-summary-content"></div>
  </section>

  <section id="recent-panel" class="panel hidden">
    <h2>Recent Editable Entries</h2>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th class="date-col">Date</th>
            <th>For</th>
            <th class="category-col">Cat</th>
            <th class="miles-col">Miles</th>
            <th>Entered By</th>
            <th class="entry-actions-col"></th>
          </tr>
        </thead>
        <tbody id="recent-body"></tbody>
      </table>
    </div>
  </section>

  <section id="challenge-panel" class="panel hidden">
    <h2>Challenges</h2>
    <div id="challenge-list"></div>
  </section>

  <script>
  const api = {
    async get(path) {
      return request(path);
    },
    async post(path, data) {
      return request(path, { method: 'POST', body: JSON.stringify(data) });
    },
    async put(path, data) {
      return request(path, { method: 'PUT', body: JSON.stringify(data) });
    },
    async delete(path) {
      return request(path, { method: 'DELETE' });
    }
  };

  let currentPerson = null;
  let people = [];
  let recentEntries = [];
  let challenges = [];

  const els = {
    loginPanel: document.getElementById('login-panel'),
    entryPanel: document.getElementById('entry-panel'),
    recentPanel: document.getElementById('recent-panel'),
    emailForm: document.getElementById('email-form'),
    codeForm: document.getElementById('code-form'),
    email: document.getElementById('email'),
    code: document.getElementById('code'),
    loginStatus: document.getElementById('login-status'),
    loggedInAs: document.getElementById('logged-in-as'),
    logout: document.getElementById('logout'),
    entryForm: document.getElementById('entry-form'),
    entryId: document.getElementById('entry-id'),
    person: document.getElementById('person'),
    activityDate: document.getElementById('activity-date'),
    activityInputs: Array.from(document.querySelectorAll('[data-activity]')),
    saveEntry: document.getElementById('save-entry'),
    cancelEdit: document.getElementById('cancel-edit'),
    entryStatus: document.getElementById('entry-status'),
    formHeading: document.getElementById('form-heading'),
    recentBody: document.getElementById('recent-body')
  };

  async function request(path, options = {}) {
    const response = await fetch(path, {
      credentials: 'same-origin',
      headers: { 'content-type': 'application/json', ...(options.headers || {}) },
      ...options
    });
    const data = await response.json().catch(() => ({}));
    if (!response.ok || data.ok === false) {
      const message = data?.error?.message || 'Something went wrong.';
      const error = new Error(message);
      error.status = response.status;
      error.code = data?.error?.code;
      error.details = data?.error;
      throw error;
    }
    return data;
  }

  function todayYmd() {
    const date = new Date();
    const year = date.getFullYear();
    const month = String(date.getMonth() + 1).padStart(2, '0');
    const day = String(date.getDate()).padStart(2, '0');
    return `${year}-${month}-${day}`;
  }

  function setStatus(element, message) {
    element.textContent = message || '';
  }

  function showApp() {
    els.loginPanel.classList.add('hidden');
    els.entryPanel.classList.remove('hidden');
    els.recentPanel.classList.remove('hidden');
    els.loggedInAs.textContent = `Logged in as ${currentPerson.f3Name} (${currentPerson.email})`;
  }

  function showLogin() {
    els.loginPanel.classList.remove('hidden');
    els.entryPanel.classList.add('hidden');
    document.getElementById('challenge-panel').classList.add('hidden');
    document.getElementById('daily-summary').classList.add('hidden');
    els.recentPanel.classList.add('hidden');
  }

  function renderPeople() {
    els.person.innerHTML = '';
    people.forEach((person) => {
      const option = document.createElement('option');
      option.value = person.id;
      option.textContent = person.f3Name;
      els.person.appendChild(option);
    });
    if (currentPerson) els.person.value = currentPerson.id;
  }

  function resetEntryForm() {
    els.entryId.value = '';
    els.formHeading.textContent = 'Enter Miles';
    els.saveEntry.textContent = 'Submit Miles';
    els.cancelEdit.classList.add('hidden');
    if (currentPerson) els.person.value = currentPerson.id;
    els.activityDate.value = todayYmd();
    els.activityInputs.forEach((input) => {
      input.value = '';
      input.disabled = false;
    });
  }

  function renderDailySummary() {
    const panel = document.getElementById('daily-summary');
    const content = document.getElementById('daily-summary-content');

    if (!currentPerson) { panel.classList.add('hidden'); return; }

    const BIKE_DIVISOR = 3;
    const SWIM_MULTIPLIER = 4;

    function yesterdayYmd() {
      const d = new Date();
      d.setDate(d.getDate() - 1);
      return `${d.getFullYear()}-${String(d.getMonth() + 1).padStart(2, '0')}-${String(d.getDate()).padStart(2, '0')}`;
    }

    function dayData(date) {
      const mine = recentEntries.filter((e) => e.personId === currentPerson.id && e.date === date);
      if (!mine.length) return null;
      const by = {};
      mine.forEach((e) => { by[e.category] = (by[e.category] || 0) + Number(e.miles || 0); });
      const earned = Math.round(((by.run || 0) + (by.walk || 0) + (by.ruck || 0) + (by.bike || 0) / BIKE_DIVISOR + (by.swim || 0) * SWIM_MULTIPLIER) * 100) / 100;
      return { by, earned };
    }

    const today = todayYmd();
    const yesterday = yesterdayYmd();
    const rows = [
      { label: 'Today', date: today, data: dayData(today) },
      { label: 'Yesterday', date: yesterday, data: dayData(yesterday) },
    ].filter((r) => r.data);

    if (!rows.length) { panel.classList.add('hidden'); return; }

    content.innerHTML = rows.map(({ label, date, data }) => {
      const [, month, day] = date.split('-');
      const parts = ['run', 'walk', 'ruck', 'bike', 'swim']
        .filter((cat) => (data.by[cat] || 0) > 0)
        .map((cat) => `${categoryName(cat)} ${Number(data.by[cat]).toFixed(2)}`);
      return `<div class="daily-summary-row">
        <span class="daily-label">${label} ${month}/${day}:</span>
        <span class="daily-earned">${data.earned.toFixed(2)} mi</span>
        ${parts.length ? `<span class="daily-breakdown">${parts.join(', ')}</span>` : ''}
      </div>`;
    }).join('');

    panel.classList.remove('hidden');
  }

  function renderRecentEntries() {
    els.recentBody.innerHTML = '';
    if (!recentEntries.length) {
      els.recentBody.innerHTML = '<tr><td colspan="6" class="muted">No editable entries yet.</td></tr>';
      return;
    }

    recentEntries.forEach((entry) => {
      const tr = document.createElement('tr');
      tr.innerHTML = `
        <td>${formatShortDate(entry.date)}</td>
        <td>${entry.name}</td>
        <td>${entry.category}</td>
        <td>${Number(entry.miles || 0).toFixed(2)}</td>
        <td>${entry.submittedByName || ''}</td>
        <td class="actions">
          <button class="secondary" type="button" data-edit="${entry.id}">Edit</button>
          <button class="danger" type="button" data-delete="${entry.id}">Delete</button>
        </td>
      `;
      els.recentBody.appendChild(tr);
    });
  }

  function categoryLabel(value) {
    return {
      run: 'runs',
      walk: 'walks',
      ruck: 'rucks',
      bike: 'bikes',
      swim: 'swims'
    }[value] || 'entries';
  }

  function categoryName(value) {
    return {
      run: 'Run',
      walk: 'Walk',
      ruck: 'Ruck',
      bike: 'Bike',
      swim: 'Swim'
    }[value] || value;
  }

  function formatDate(value) {
    if (!/^\d{4}-\d{2}-\d{2}$/.test(value || '')) return value;
    const [year, month, day] = value.split('-').map(Number);
    return `${month}/${day}/${year}`;
  }

  function formatShortDate(value) {
    if (!/^\d{4}-\d{2}-\d{2}$/.test(value || '')) return value || '';
    const [, month, day] = value.split('-');
    return `${month}/${day}`;
  }

  function sameDayActivityPrompt(payload) {
    const selected = people.find((person) => person.id === payload.personId);
    const name = selected ? selected.f3Name : 'this PAX';
    return `There is already a ${payload.category} entry for ${name} on ${formatDate(payload.activityDate)}. Are you sure ${name} did 2 ${categoryLabel(payload.category)} that day?`;
  }

  function activityPayloads(confirmSameDayActivity = false) {
    const personId = els.person.value;
    const activityDate = els.activityDate.value;
    const entries = els.activityInputs
      .map((input) => ({
        personId,
        activityDate,
        category: input.dataset.activity,
        miles: Number(input.value || 0),
        confirmSameDayActivity
      }))
      .filter((entry) => Number.isFinite(entry.miles) && entry.miles > 0);

    if (!entries.length) {
      throw new Error('Enter miles for at least one activity.');
    }
    return entries;
  }

  function summaryParam(entries) {
    return entries
      .map((entry) => `${categoryName(entry.category)} ${Number(entry.miles).toFixed(2)}`)
      .join(', ');
  }

  async function savePayloadWithConfirmation(path, method, payload) {
    try {
      return method === 'PUT' ? await api.put(path, payload) : await api.post(path, payload);
    } catch (err) {
      if (err.code === 'SAME_DAY_ACTIVITY_CONFIRMATION_REQUIRED') {
        if (confirm(sameDayActivityPrompt(payload))) {
          return method === 'PUT'
            ? await api.put(path, { ...payload, confirmSameDayActivity: true })
            : await api.post(path, { ...payload, confirmSameDayActivity: true });
        }
        throw new Error('Entry was not saved.');
      }
      throw err;
    }
  }

  async function saveEntry() {
    setStatus(els.entryStatus, 'Saving...');
    try {
      if (els.entryId.value) {
        const payload = activityPayloads(false)[0];
        await savePayloadWithConfirmation(`/api/miles/entries/${encodeURIComponent(els.entryId.value)}`, 'PUT', payload);
        setStatus(els.entryStatus, 'Entry updated.');
        await loadAppData();
      } else {
        const payloads = activityPayloads(false);
        const saved = [];
        for (const payload of payloads) {
          const result = await savePayloadWithConfirmation('/api/miles/entries', 'POST', payload);
          saved.push(result.entry || payload);
        }
        const name = saved[0]?.name || currentPerson.f3Name;
        window.location.href = `/pax/miles/data.html?submitted=1&name=${encodeURIComponent(name)}&summary=${encodeURIComponent(summaryParam(saved))}&date=${encodeURIComponent(els.activityDate.value)}`;
      }
    } catch (err) {
      setStatus(els.entryStatus, err.message);
    }
  }

  function renderChallengePanel() {
    const panel = document.getElementById('challenge-panel');
    const list = document.getElementById('challenge-list');

    if (!challenges.length || !currentPerson) {
      panel.classList.add('hidden');
      return;
    }

    panel.classList.remove('hidden');
    list.innerHTML = '';
    challenges.forEach((challenge) => {
      const isEnrolled = challenge.participants.includes(currentPerson.f3Name);
      const div = document.createElement('div');
      div.style.marginBottom = '0.5rem';
      div.innerHTML = `
        <div class="actions">
          <span>${challenge.name}: <strong>${isEnrolled ? 'Opted In' : 'Not Opted In'}</strong></span>
          <button class="secondary" type="button"
            data-challenge-id="${challenge.id}"
            data-enrolled="${isEnrolled ? '1' : '0'}">
            ${isEnrolled ? 'Opt Out' : 'Opt In'}
          </button>
        </div>
      `;
      list.appendChild(div);
    });
  }

  async function loadChallenges() {
    try {
      const data = await api.get('/api/challenges');
      const today = todayYmd();
      const oneWeekAgo = new Date(Date.now() - 7 * 24 * 60 * 60 * 1000);
      const weekAgoYmd = `${oneWeekAgo.getFullYear()}-${String(oneWeekAgo.getMonth() + 1).padStart(2, '0')}-${String(oneWeekAgo.getDate()).padStart(2, '0')}`;
      challenges = (data.challenges || []).filter((c) => c.endDate >= weekAgoYmd);
    } catch {
      challenges = [];
    }
    renderChallengePanel();
  }

  async function loadAppData() {
    const [me, peopleData, entriesData] = await Promise.all([
      api.get('/api/me'),
      api.get('/api/people'),
      api.get('/api/miles/my-entries')
    ]);
    currentPerson = me.person;
    people = peopleData.people || [];
    recentEntries = entriesData.entries || [];
    renderPeople();
    renderRecentEntries();
    renderDailySummary();
    resetEntryForm();
    showApp();
    await loadChallenges();
  }

  document.getElementById('already-have-code').addEventListener('click', () => {
    els.codeForm.classList.remove('hidden');
    setStatus(els.loginStatus, 'Enter your email and the code you already received.');
    if (els.email.value.trim()) {
      els.code.focus();
    } else {
      els.email.focus();
    }
  });

  els.emailForm.addEventListener('submit', async (event) => {
    event.preventDefault();
    setStatus(els.loginStatus, 'Sending code...');
    try {
      const result = await api.post('/api/auth/request-code', { email: els.email.value });
      els.codeForm.classList.remove('hidden');
      setStatus(
        els.loginStatus,
        result.devAuthBypass ? `Local dev mode: Slack was checked; use code ${result.devLoginCode}.` : 'Check your email for a 6 digit code.'
      );
      els.code.focus();
    } catch (err) {
      setStatus(els.loginStatus, err.message);
    }
  });

  els.codeForm.addEventListener('submit', async (event) => {
    event.preventDefault();
    setStatus(els.loginStatus, 'Verifying...');
    try {
      const result = await api.post('/api/auth/verify-code', {
        email: els.email.value,
        code: els.code.value
      });
      currentPerson = result.person;
      setStatus(els.loginStatus, '');
      await loadAppData();
    } catch (err) {
      setStatus(els.loginStatus, err.message);
    }
  });

  els.entryForm.addEventListener('submit', async (event) => {
    event.preventDefault();
    await saveEntry();
  });

  els.recentBody.addEventListener('click', async (event) => {
    const editId = event.target.dataset.edit;
    const deleteId = event.target.dataset.delete;

    if (editId) {
      const entry = recentEntries.find((item) => item.id === editId);
      if (!entry) return;
      els.entryId.value = entry.id;
      els.person.value = entry.personId;
      els.activityDate.value = entry.date;
      els.activityInputs.forEach((input) => {
        input.value = input.dataset.activity === entry.category ? Number(entry.miles || 0).toFixed(2) : '';
        input.disabled = input.dataset.activity !== entry.category;
      });
      els.formHeading.textContent = 'Edit Miles';
      els.saveEntry.textContent = 'Save Changes';
      els.cancelEdit.classList.remove('hidden');
      setStatus(els.entryStatus, '');
      els.entryPanel.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    if (deleteId) {
      if (!confirm('Delete this miles entry?')) return;
      setStatus(els.entryStatus, 'Deleting...');
      try {
        await api.delete(`/api/miles/entries/${encodeURIComponent(deleteId)}`);
        setStatus(els.entryStatus, 'Entry deleted.');
        await loadAppData();
      } catch (err) {
        setStatus(els.entryStatus, err.message);
      }
    }
  });

  els.cancelEdit.addEventListener('click', () => {
    resetEntryForm();
    setStatus(els.entryStatus, '');
  });

  document.getElementById('challenge-list').addEventListener('click', async (event) => {
    const button = event.target.closest('button[data-challenge-id]');
    if (!button) return;
    const challengeId = button.dataset.challengeId;
    const enrolled = button.dataset.enrolled === '1';
    button.disabled = true;
    try {
      await api.post(`/api/challenges/${encodeURIComponent(challengeId)}/enroll`, { enrolled: !enrolled });
      await loadChallenges();
    } catch (err) {
      setStatus(els.entryStatus, err.message);
      button.disabled = false;
    }
  });

  els.logout.addEventListener('click', async () => {
    await api.post('/api/auth/logout', {});
    currentPerson = null;
    people = [];
    recentEntries = [];
    showLogin();
  });

  async function init() {
    els.activityDate.value = todayYmd();
    try {
      await loadAppData();
    } catch {
      showLogin();
    }
  }

  init();
  </script>
</body>
</html>
