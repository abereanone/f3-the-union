<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="robots" content="noindex, nofollow" />
  <title>FNG History â€” F3 The Union</title>
  <link rel="icon" href="/favicon.ico" />
  <link rel="stylesheet" href="../../style.css" />
  <link rel="stylesheet" href="/public.css" />
  <style>
    body { max-width: 98vw; padding: 0 1rem; }

    .top-nav {
      display: flex;
      gap: 1.5rem;
      align-items: center;
      margin-bottom: 1rem;
      font-weight: 600;
      background: #fff;
    }
    .top-nav a { color: #1f3b6d; text-decoration: none; }
    .top-nav a:hover, .top-nav a:focus { text-decoration: underline; }

    .panel {
      border: 1px solid #d7dce8;
      border-radius: 6px;
      padding: 1.1rem;
      margin: 1.15rem 0;
      background: #fff;
    }

    .form-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(210px, 1fr));
      gap: 1rem;
      align-items: end;
    }

    label { display: grid; gap: 0.35rem; font-weight: 700; }

    input, select, button { font: inherit; }

    input, select {
      box-sizing: border-box;
      width: 100%;
      padding: 0.52rem 0.6rem;
      border: 1px solid #cfd6e5;
      border-radius: 4px;
    }

    button {
      border: 0;
      border-radius: 4px;
      background: #1f3b6d;
      color: #fff;
      padding: 0.55rem 0.8rem;
      cursor: pointer;
      font-weight: 800;
    }

    button.secondary {
      background: #eef2f9;
      color: #1f3b6d;
      border: 1px solid #cfd6e5;
    }

    button.danger { background: #7c241f; }

    button:disabled { opacity: 0.55; cursor: not-allowed; }

    .status { min-height: 1.4rem; color: #345; font-weight: 700; }

    .actions { display: flex; flex-wrap: wrap; gap: 0.65rem; align-items: center; }

    .hidden { display: none !important; }

    .table-wrap { overflow-x: auto; }

    table { width: 100%; border-collapse: collapse; margin-top: 0.75rem; font-size: 0.9rem; }

    th, td { border: 1px solid #ddd; padding: 0.4rem 0.55rem; text-align: left; }

    th { background: #d9e3f7; color: #1f3b6d; white-space: nowrap; }

    tr:nth-child(even) td { background: #f8fafc; }

    .badge {
      display: inline-block;
      padding: 0.15rem 0.45rem;
      border-radius: 3px;
      font-size: 0.8rem;
      font-weight: 700;
    }

    .badge.yes { background: #d4edda; color: #155724; }
    .badge.no { background: #f8d7da; color: #721c24; }

    .charts-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
      gap: 1.5rem;
      margin-top: 1rem;
    }

    .chart-box { background: #f8fafc; border: 1px solid #dfe5f0; border-radius: 6px; padding: 1rem; }

    .chart-box h3 { margin: 0 0 0.75rem; color: #1f3b6d; font-size: 1rem; }

    .bar-row {
      display: flex;
      align-items: center;
      gap: 0.5rem;
      margin-bottom: 0.4rem;
      font-size: 0.88rem;
    }

    .bar-label { width: 130px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex-shrink: 0; }

    .bar-track { flex: 1; background: #dfe5f0; border-radius: 3px; height: 18px; overflow: hidden; }

    .bar-fill { height: 100%; background: #1f3b6d; border-radius: 3px; transition: width 0.3s; }

    .bar-count { width: 28px; text-align: right; font-weight: 700; flex-shrink: 0; }

    .search-row { display: flex; gap: 0.5rem; align-items: center; flex-wrap: wrap; margin-bottom: 0.75rem; }

    .search-row input { max-width: 280px; }

    .filter-select { max-width: 180px; }

    .total-badge {
      font-size: 0.9rem;
      color: #555;
    }

    .edit-form { display: none; padding: 0.75rem; background: #f8fafc; border-top: 1px solid #ddd; }
    .edit-form.open { display: block; }
    .edit-form .form-grid { margin-bottom: 0.75rem; }

    @media (max-width: 600px) {
      .panel { padding: 0.9rem; }
      .form-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <header class="site-header">
  <a class="brand" href="/"><img src="/media/f3-logo.webp" alt="F3" class="brand-logo" />F3 The Union</a>
  <nav class="public-nav" aria-label="PAX navigation">
    <a href="/pax/">PAX Home</a>
    <a href="/pax/fng/">FNG</a>
    <a href="/pax/miles/">Miles</a>
    <a href="/pax/miles/data.html">Miles Data</a>
    <a href="/pax/reports/">Reports</a>
    <a href="/pax/reminders/">Reminders</a>
  </nav>
</header>
  <h1>FNG History</h1>

  <!-- Login panel -->
  <section id="login-panel" class="panel">
    <h2>Log In</h2>
    <form id="email-form" class="form-grid">
      <label>Email <input id="email" type="email" autocomplete="email" required /></label>
      <button id="request-code" type="submit">Send Code</button>
    </form>
    <div style="margin-top:0.5rem;">
      <button id="already-have-code" class="secondary" type="button" style="font-size:0.88rem;padding:0.3rem 0.6rem;">Already have a code?</button>
    </div>
    <form id="code-form" class="form-grid hidden" style="margin-top:0.85rem;">
      <label>Code <input id="code" type="text" inputmode="numeric" autocomplete="one-time-code" maxlength="6" required /></label>
      <button id="verify-code" type="submit">Verify</button>
    </form>
    <div id="login-status" class="status"></div>
  </section>

  <!-- Main content (shown after login) -->
  <div id="main-content" class="hidden">
    <div class="actions" style="margin-bottom:0.5rem;">
      <strong id="logged-in-as"></strong>
      <button id="logout" class="secondary" type="button">Log Out</button>
      <button id="export-btn" class="secondary" type="button">Export to Excel</button>
      <a href="/pax/fng/" style="margin-left:auto;font-size:0.9rem;color:#1f3b6d;">+ New FNG</a>
    </div>

    <!-- Charts -->
    <section class="panel">
      <h2 style="margin-top:0;">Stats</h2>
      <div class="charts-grid">
        <div class="chart-box">
          <h3>Top EH'ers</h3>
          <div id="chart-eh"></div>
        </div>
        <div class="chart-box">
          <h3>FNGs by Location</h3>
          <div id="chart-location"></div>
        </div>
        <div class="chart-box">
          <h3>FNGs by Month</h3>
          <div id="chart-month"></div>
        </div>
      </div>
    </section>

    <!-- Table -->
    <section class="panel">
      <h2 style="margin-top:0;">All FNG Entries <span id="total-badge" class="total-badge"></span></h2>

      <div class="search-row">
        <input id="search-input" type="search" placeholder="Search name, location, EHâ€¦" />
        <select id="filter-location" class="filter-select">
          <option value="">All locations</option>
        </select>
        <select id="filter-slack" class="filter-select">
          <option value="">All</option>
          <option value="yes">Joined Slack</option>
          <option value="no">Not in Slack</option>
        </select>
      </div>

      <div class="table-wrap">
        <table id="fng-table">
          <thead>
            <tr>
              <th>Date</th>
              <th>Legal Name</th>
              <th>F3 Name</th>
              <th>Location</th>
              <th>EH'd By</th>
              <th>Email</th>
              <th>Phone</th>
              <th>Slack?</th>
              <th>2nd Post</th>
              <th>Notes</th>
              <th></th>
            </tr>
          </thead>
          <tbody id="fng-tbody"></tbody>
        </table>
      </div>
      <div id="table-status" class="status" style="margin-top:0.5rem;"></div>
    </section>
  </div>
  <script>
    // â”€â”€ Auth â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
    let currentPerson = null;
    let allEntries = [];

    async function checkSession() {
      try {
        const res = await fetch('/api/me');
        if (res.ok) {
          const data = await res.json();
          onLogin(data.person);
        }
      } catch {}
    }

    function onLogin(person) {
      currentPerson = person;
      document.getElementById('login-panel').classList.add('hidden');
      document.getElementById('main-content').classList.remove('hidden');
      document.getElementById('logged-in-as').textContent = person.f3Name;
      loadEntries();
    }

    function setLoginStatus(msg, isError) {
      const el = document.getElementById('login-status');
      el.textContent = msg;
      el.style.color = isError ? '#7c241f' : '#345';
    }

    document.getElementById('email-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('request-code');
      btn.disabled = true;
      setLoginStatus('Sendingâ€¦', false);
      try {
        const res = await fetch('/api/auth/request-code', {
          method: 'POST',
          headers: { 'content-type': 'application/json' },
          body: JSON.stringify({ email: document.getElementById('email').value }),
        });
        const data = await res.json();
        if (!res.ok) { setLoginStatus(data?.error?.message || 'Error sending code.', true); return; }
        document.getElementById('code-form').classList.remove('hidden');
        setLoginStatus('Code sent â€” check your email.', false);
        if (data.devAuthBypass) setLoginStatus(`Dev mode: use ${data.devLoginCode || '000000'}`, false);
      } catch { setLoginStatus('Network error.', true); }
      finally { btn.disabled = false; }
    });

    document.getElementById('already-have-code').addEventListener('click', () => {
      document.getElementById('code-form').classList.remove('hidden');
    });

    document.getElementById('code-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('verify-code');
      btn.disabled = true;
      setLoginStatus('Verifyingâ€¦', false);
      try {
        const res = await fetch('/api/auth/verify-code', {
          method: 'POST',
          headers: { 'content-type': 'application/json' },
          body: JSON.stringify({
            email: document.getElementById('email').value,
            code: document.getElementById('code').value,
          }),
        });
        const data = await res.json();
        if (!res.ok) { setLoginStatus(data?.error?.message || 'Login failed.', true); return; }
        onLogin(data.person);
      } catch { setLoginStatus('Network error.', true); }
      finally { btn.disabled = false; }
    });

    document.getElementById('logout').addEventListener('click', async () => {
      await fetch('/api/auth/logout', { method: 'POST' });
      location.reload();
    });

    // â”€â”€ Data â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
    async function loadEntries() {
      try {
        const res = await fetch('/api/fng/entries');
        const data = await res.json();
        allEntries = data.entries || [];
        renderTable();
        renderCharts();
        populateLocationFilter();
      } catch {
        document.getElementById('table-status').textContent = 'Failed to load entries.';
      }
    }

    // â”€â”€ Filters â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
    function filteredEntries() {
      const q = document.getElementById('search-input').value.trim().toLowerCase();
      const loc = document.getElementById('filter-location').value;
      const slack = document.getElementById('filter-slack').value;

      return allEntries.filter((e) => {
        if (loc && e.location !== loc) return false;
        if (slack === 'yes' && !e.joinedSlack) return false;
        if (slack === 'no' && e.joinedSlack) return false;
        if (q) {
          const haystack = [e.legalName, e.f3Name, e.location, e.ehedBy, e.email, e.notes]
            .filter(Boolean).join(' ').toLowerCase();
          if (!haystack.includes(q)) return false;
        }
        return true;
      });
    }

    ['search-input', 'filter-location', 'filter-slack'].forEach((id) => {
      document.getElementById(id).addEventListener('input', renderTable);
    });

    function populateLocationFilter() {
      const sel = document.getElementById('filter-location');
      const locs = [...new Set(allEntries.map((e) => e.location))].sort();
      locs.forEach((l) => {
        const opt = document.createElement('option');
        opt.value = l;
        opt.textContent = l;
        sel.appendChild(opt);
      });
    }

    // â”€â”€ Table â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
    function renderTable() {
      const entries = filteredEntries();
      const tbody = document.getElementById('fng-tbody');
      document.getElementById('total-badge').textContent = `(${entries.length} of ${allEntries.length})`;
      tbody.innerHTML = '';

      entries.forEach((e) => {
        const date = e.sourceTimestamp
          ? new Date(e.sourceTimestamp).toLocaleDateString()
          : new Date(e.createdAt).toLocaleDateString();

        const tr = document.createElement('tr');
        tr.dataset.id = e.id;
        tr.innerHTML = `
          <td>${date}</td>
          <td>${esc(e.legalName)}</td>
          <td>${esc(e.f3Name || 'â€”')}</td>
          <td>${esc(e.location)}</td>
          <td>${esc(e.ehedBy || 'â€”')}</td>
          <td>${e.email ? `<a href="mailto:${esc(e.email)}">${esc(e.email)}</a>` : 'â€”'}</td>
          <td>${esc(e.phone || 'â€”')}</td>
          <td><span class="badge ${e.joinedSlack ? 'yes' : 'no'}">${e.joinedSlack ? 'Yes' : 'No'}</span></td>
          <td>${esc(e.secondPost || 'â€”')}</td>
          <td>${esc(e.notes || 'â€”')}</td>
          <td>
            ${currentPerson?.isAdmin
              ? `<button class="secondary edit-row-btn" data-id="${esc(e.id)}" style="font-size:0.8rem;padding:0.25rem 0.5rem;">Edit</button>`
              : ''}
          </td>`;
        tbody.appendChild(tr);

        if (currentPerson?.isAdmin) {
          const editRow = document.createElement('tr');
          editRow.id = `edit-row-${e.id}`;
          editRow.innerHTML = `<td colspan="11" style="padding:0;"></td>`;
          tbody.appendChild(editRow);
        }
      });

      tbody.querySelectorAll('.edit-row-btn').forEach((btn) => {
        btn.addEventListener('click', () => openEditForm(btn.dataset.id));
      });
    }

    function esc(str) {
      return String(str ?? '').replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    // â”€â”€ Edit form â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
    async function openEditForm(entryId) {
      const existing = document.getElementById(`form-${entryId}`);
      if (existing) { existing.remove(); return; }

      const entry = allEntries.find((e) => e.id === entryId);
      if (!entry) return;

      const cell = document.querySelector(`#edit-row-${entryId} td`);
      cell.innerHTML = `
        <div id="form-${entryId}" class="edit-form open">
          <div class="form-grid">
            <label>Legal Name *<input class="ef-legal" value="${esc(entry.legalName)}" /></label>
            <label>F3 Name<input class="ef-f3" value="${esc(entry.f3Name || '')}" /></label>
            <label>Email<input class="ef-email" type="email" value="${esc(entry.email || '')}" /></label>
            <label>Phone<input class="ef-phone" value="${esc(entry.phone || '')}" /></label>
          </div>
          <div class="form-grid" style="margin-top:0.5rem;">
            <label>Emergency Contact<input class="ef-ec" value="${esc(entry.emergencyContact || '')}" /></label>
            <label>Location *<select class="ef-loc">${locationOptions(entry.location)}</select></label>
            <label>EH'd By<input class="ef-eh" value="${esc(entry.ehedBy || '')}" /></label>
            <label>2nd Post<input class="ef-2nd" type="date" value="${esc(entry.secondPost || '')}" /></label>
          </div>
          <div class="form-grid" style="margin-top:0.5rem;">
            <label style="flex-direction:row;align-items:center;gap:0.5rem;font-weight:400;">
              <input class="ef-slack" type="checkbox" style="width:auto;" ${entry.joinedSlack ? 'checked' : ''} />
              <span style="font-weight:700;">Joined Slack</span>
            </label>
          </div>
          <label style="margin-top:0.5rem;">Notes<textarea class="ef-notes" rows="2">${esc(entry.notes || '')}</textarea></label>
          <div class="actions" style="margin-top:0.65rem;">
            <button class="save-edit-btn" data-id="${esc(entryId)}">Save</button>
            <button class="cancel-edit-btn secondary" data-id="${esc(entryId)}">Cancel</button>
            <button class="delete-entry-btn danger" data-id="${esc(entryId)}" style="margin-left:auto;">Delete</button>
          </div>
          <div class="edit-status status"></div>
        </div>`;

      cell.querySelector('.cancel-edit-btn').addEventListener('click', () => cell.innerHTML = '');
      cell.querySelector('.save-edit-btn').addEventListener('click', () => saveEdit(entryId, cell));
      cell.querySelector('.delete-entry-btn').addEventListener('click', () => deleteEntry(entryId));
    }

    function locationOptions(current) {
      const locations = [
        'The Farm', 'The Yard', 'The Factory', 'The Plant', 'The Redzone',
        'The Dock', 'The Cafeteria', 'The Floor', 'The Forge',
        'The Clocktower', 'The Fountain', 'The Show',
      ];
      return locations.map((l) =>
        `<option value="${esc(l)}" ${l === current ? 'selected' : ''}>${esc(l)}</option>`
      ).join('');
    }

    async function saveEdit(entryId, cell) {
      const form = cell.querySelector(`#form-${entryId}`);
      const statusEl = form.querySelector('.edit-status');
      statusEl.textContent = 'Savingâ€¦';

      const payload = {
        legalName: form.querySelector('.ef-legal').value.trim(),
        f3Name: form.querySelector('.ef-f3').value.trim(),
        email: form.querySelector('.ef-email').value.trim(),
        phone: form.querySelector('.ef-phone').value.trim(),
        emergencyContact: form.querySelector('.ef-ec').value.trim(),
        location: form.querySelector('.ef-loc').value,
        ehedBy: form.querySelector('.ef-eh').value.trim(),
        joinedSlack: form.querySelector('.ef-slack').checked,
        secondPost: form.querySelector('.ef-2nd').value || null,
        notes: form.querySelector('.ef-notes').value.trim(),
      };

      try {
        const res = await fetch(`/api/fng/entries/${entryId}`, {
          method: 'PUT',
          headers: { 'content-type': 'application/json' },
          body: JSON.stringify(payload),
        });
        const data = await res.json();
        if (!res.ok) { statusEl.textContent = data?.error?.message || 'Save failed.'; return; }
        await loadEntries();
      } catch { statusEl.textContent = 'Network error.'; }
    }

    async function deleteEntry(entryId) {
      if (!confirm('Delete this FNG entry? This cannot be undone.')) return;
      try {
        const res = await fetch(`/api/fng/entries/${entryId}`, { method: 'DELETE' });
        if (res.ok) await loadEntries();
      } catch {}
    }

    // â”€â”€ Charts â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
    function renderCharts() {
      renderBarChart('chart-eh', topCount(allEntries, (e) => e.ehedBy), '#1f3b6d');
      renderBarChart('chart-location', topCount(allEntries, (e) => e.location), '#3a5c9a');
      renderBarChart('chart-month', topCount(allEntries, (e) => {
        const d = new Date(e.sourceTimestamp || e.createdAt);
        return isNaN(d) ? null : d.toLocaleString('default', { month: 'long' });
      }), '#4a7ab5');
    }

    function topCount(entries, keyFn, limit = 10) {
      const counts = {};
      entries.forEach((e) => {
        const k = keyFn(e);
        if (k) counts[k] = (counts[k] || 0) + 1;
      });
      return Object.entries(counts)
        .sort((a, b) => b[1] - a[1])
        .slice(0, limit);
    }

    function renderBarChart(containerId, data, color) {
      const container = document.getElementById(containerId);
      if (!data.length) { container.textContent = 'No data yet.'; return; }
      const max = data[0][1];
      container.innerHTML = data.map(([label, count]) => `
        <div class="bar-row">
          <div class="bar-label" title="${esc(label)}">${esc(label)}</div>
          <div class="bar-track">
            <div class="bar-fill" style="width:${Math.round(count / max * 100)}%;background:${color};"></div>
          </div>
          <div class="bar-count">${count}</div>
        </div>`).join('');
    }

    // â”€â”€ Export â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
    document.getElementById('export-btn').addEventListener('click', exportToCSV);

    function exportToCSV() {
      const headers = ['Date', 'Legal Name', 'F3 Name', 'Location', "EH'd By", 'Email', 'Phone',
        'Emergency Contact', 'Joined Slack', '2nd Post', 'Notes', 'Created At'];
      const rows = allEntries.map((e) => [
        e.sourceTimestamp ? new Date(e.sourceTimestamp).toLocaleDateString() : new Date(e.createdAt).toLocaleDateString(),
        e.legalName, e.f3Name || '', e.location, e.ehedBy || '',
        e.email || '', e.phone || '', e.emergencyContact || '',
        e.joinedSlack ? 'Yes' : 'No', e.secondPost || '', e.notes || '',
        new Date(e.createdAt).toLocaleString(),
      ]);
      const csv = [headers, ...rows].map((row) =>
        row.map((cell) => `"${String(cell).replace(/"/g, '""')}"`).join(',')
      ).join('\n');

      const blob = new Blob([csv], { type: 'text/csv' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `fng-history-${new Date().toISOString().slice(0, 10)}.csv`;
      a.click();
      URL.revokeObjectURL(url);
    }

    // â”€â”€ Init â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€â”€
    checkSession();
  </script>
