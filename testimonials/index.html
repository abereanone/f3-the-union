<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Testimonials - F3 The Union</title>
  <meta name="description" content="Stories from men in Union County, Ohio who found fitness, fellowship, and community through F3 The Union." />
  <link rel="canonical" href="https://f3theunion.com/testimonials/" />
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="F3 The Union" />
  <meta property="og:url" content="https://f3theunion.com/testimonials/" />
  <meta property="og:title" content="Testimonials - F3 The Union" />
  <meta property="og:description" content="Stories from men in Union County, Ohio who found fitness, fellowship, and community through F3 The Union." />
  <meta property="og:image" content="https://f3theunion.com/media/group-large-flags.jpg" />
  <meta name="twitter:card" content="summary_large_image" />
  <link rel="icon" href="/favicon.ico" />
  <link rel="stylesheet" href="/public.css" />
</head>
<body>
  <div id="public-nav"></div><script src="/shared/public-nav.js"></script>

  <main>
    <section class="page-intro">
      <div class="section-inner">
        <h1>Testimonials</h1>
      </div>
    </section>

    <section class="band">
      <div class="section-inner testimonial-shell" aria-live="polite">
        <div class="testimonial-media">
          <img id="testimonial-photo" src="/media/floppy-disk.jpg" alt="Michael C. Testimonial." />
        </div>
        <blockquote class="testimonial-quote" id="testimonial-quote"></blockquote>
        <p class="testimonial-name" id="testimonial-name">Michael C.</p>
        <div class="slider-controls">
          <button id="prev-testimonial" type="button">Previous</button>
          <div id="testimonial-dots" class="dots" aria-label="Testimonial position"></div>
          <button id="next-testimonial" type="button">Next</button>
        </div>
      </div>
    </section>
  </main>

  <footer class="site-footer">
    <div class="section-inner">
      <div class="footer-brand">
        <img src="/media/f3-logo.webp" alt="F3 Nation logo" class="footer-logo" />
        <p class="mission">The mission of F3 is to plant, grow, and serve small workout groups for men for the invigoration of male community leadership.</p>
      </div>
      <nav class="footer-links" aria-label="Footer navigation">
        <a href="/">Home</a>
        <a href="/core-principles/">Core Principles</a>
        <a href="/gallery/">Gallery</a>
        <a href="/login/">PAX Login</a>
      </nav>
    </div>
      <div class="section-inner footer-legal">
      The F3 logo is a trademark of F3 Nation and is used with permission. <a href="https://f3nation.com" target="_blank" rel="noopener">F3Nation.com</a>
    </div>
  </footer>

  <script>
    const testimonials = [
      {
        name: 'Michael',
        photo: '/media/floppydisk.jpg',
        quote: 'The most significant change I\'ve experienced through F3 is learning that I can do much harder things than I thought possible.',
      },
      {
        name: 'Brent',
        photo: '/media/village-people.jpg',
        quote: 'Intentionality & growth. F3 is a leadership group disguised as a fitness group. Don\'t get me wrong, the fitness is a great added benefit, but everything else it offers is simply life altering.',
      },
      {
        name: 'Justin',
        photo: '/media/giaimo.jpg',
        quote: 'F3 delivers on the fitness, but it\'s the fellowship that keeps you coming back. Being part of this group has directly challenged and equipped me to be a better leader, husband, and father.',
      },
      {
        name: 'Josh',
        photo: '/media/ocho.jpg',
        quote: 'F3 has made an impact on my life outside of the workouts. Being surrounded by other men in similar walks of life highlights that we all experience similar struggles and can walk the path together.',
      },
    ];

    let activeIndex = Math.floor(Math.random() * testimonials.length);
    const photo = document.getElementById('testimonial-photo');
    const quote = document.getElementById('testimonial-quote');
    const name = document.getElementById('testimonial-name');
    const dots = document.getElementById('testimonial-dots');


    function renderDots() {
      dots.innerHTML = testimonials.map((_, index) => `<span class="dot${index === activeIndex ? ' active' : ''}"></span>`).join('');
    }

    function renderTestimonial() {
      const item = testimonials[activeIndex];
      photo.src = item.photo;
      photo.alt = `${item.name} testimonial photo placeholder`;
      quote.textContent = item.quote;
      name.textContent = item.name;
      renderDots();
    }

    function move(delta) {
      activeIndex = (activeIndex + delta + testimonials.length) % testimonials.length;
      renderTestimonial();
    }

    document.getElementById('prev-testimonial').addEventListener('click', () => move(-1));
    document.getElementById('next-testimonial').addEventListener('click', () => move(1));
    renderTestimonial();
  </script>
</body>
</html>
