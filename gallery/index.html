<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Photo Gallery - F3 The Union</title>
  <meta name="description" content="Photos from F3 The Union workouts, service projects, and community events across Union County, Ohio." />
  <link rel="canonical" href="https://f3theunion.com/gallery/" />
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="F3 The Union" />
  <meta property="og:url" content="https://f3theunion.com/gallery/" />
  <meta property="og:title" content="Photo Gallery - F3 The Union" />
  <meta property="og:description" content="Photos from F3 The Union workouts, service projects, and community events across Union County, Ohio." />
  <meta property="og:image" content="https://f3theunion.com/media/group-large-flags.jpg" />
  <meta name="twitter:card" content="summary_large_image" />
  <link rel="icon" href="/favicon.ico" />
  <link rel="stylesheet" href="/public.css" />
</head>
<body>
  <div id="public-nav"></div><script src="/shared/public-nav.js"></script>

  <main>
    <section class="page-intro">
      <div class="section-inner">
        <h1>Photo the Gallery</h1>
      </div>
    </section>

    <section class="band">
      <div class="section-inner gallery-shell">
        <div class="gallery-layout">
          <div class="gallery-thumbs-col" id="gallery-thumbs"></div>
          <div class="gallery-viewer">
            <img id="gallery-photo" src="/media/group-large-flags.jpg" alt="" />
            <p id="gallery-caption" class="gallery-caption"></p>
          </div>
        </div>
      </div>
    </section>
  </main>

  <!-- Lightbox (mobile) -->
  <div id="gallery-lightbox" class="gallery-lightbox" role="dialog" aria-modal="true">
    <button class="lb-close" id="lb-close" aria-label="Close">✕</button>
    <img id="lb-img" src="" alt="" />
    <p class="lb-caption" id="lb-caption"></p>
    <div class="lb-controls">
      <button id="lb-prev" type="button">&#8249; Prev</button>
      <button id="lb-next" type="button">Next &#8250;</button>
    </div>
  </div>

  <footer class="site-footer">
    <div class="section-inner">
      <div class="footer-brand">
        <img src="/media/f3-logo.webp" alt="F3 Nation logo" class="footer-logo" />
        <p class="mission">The mission of F3 is to plant, grow, and serve small workout groups for men for the invigoration of male community leadership.</p>
      </div>
      <nav class="footer-links" aria-label="Footer navigation">
        <a href="/">Home</a>
        <a href="/core-principles/">Core Principles</a>
        <a href="/testimonials/">Testimonials</a>
        <a href="/login/">PAX Login</a>
      </nav>
    </div>
      <div class="section-inner footer-legal">
      The F3 logo is a trademark of F3 Nation and is used with permission. <a href="https://f3nation.com" target="_blank" rel="noopener">F3Nation.com</a>
    </div>
  </footer>

  <script>
    const galleryPhotos = [
      { src: '/media/group-large-flags.jpg', caption: 'Morning workout complete!' },
      { src: '/media/gallery-2.jpg', caption: '' },
      { src: '/media/foggy-morning.jpg', caption: 'A foggy morning post.' },
      { src: '/media/parking-lot-post.jpg', caption: 'Exercise finished; ready to lead families and communities.' },
      { src: '/media/playground-post.jpg', caption: 'Post at the playground.' },
      { src: '/media/gallery-7.jpg', caption: 'Why we do what we do.' },
      { src: '/media/race-day-church.jpg', caption: 'Race day with the PAX.' },
      { src: '/media/turkey-trot-flag.jpg', caption: 'Carrying the colors through the rain.' },
      { src: '/media/service-project-yard.jpg', caption: 'Serving the community - a neighborhood service project at New Path.' },
      { src: '/media/coffee-circle.jpg', caption: 'Coffee and fellowship after the workout.' },
      { src: '/media/gallery-1.jpg', caption: '' },
      { src: '/media/fellowship-dinner.jpg', caption: 'Fellowship dinner with the PAX and their wives.' },
      { src: '/media/food-pantry-christmas.jpg', caption: 'Christmas drop at the Marysville Food Pantry.' },
      { src: '/media/community-booth.jpg', caption: 'F3 The Union at a local community event.' },
      { src: '/media/f3-theunion-logo.jpg', caption: 'F3 The Union — Fitness. Fellowship. Faith.' },
    ];

    let activePhoto = 0;
    const isMobile = () => window.matchMedia('(max-width: 700px)').matches;

    const photo = document.getElementById('gallery-photo');
    const caption = document.getElementById('gallery-caption');
    const thumbsCol = document.getElementById('gallery-thumbs');
    const lightbox = document.getElementById('gallery-lightbox');
    const lbImg = document.getElementById('lb-img');
    const lbCaption = document.getElementById('lb-caption');

    function updateViewer(index) {
      const item = galleryPhotos[index];
      photo.src = item.src;
      photo.alt = item.caption;
      caption.textContent = item.caption;
      thumbsCol.querySelectorAll('button').forEach((btn, i) => {
        btn.classList.toggle('active', i === index);
      });
    }

    function openLightbox(index) {
      activePhoto = index;
      const item = galleryPhotos[index];
      lbImg.src = item.src;
      lbImg.alt = item.caption;
      lbCaption.textContent = item.caption;
      lightbox.classList.add('open');
      document.body.style.overflow = 'hidden';
    }

    function closeLightbox() {
      lightbox.classList.remove('open');
      document.body.style.overflow = '';
    }

    function lbMove(delta) {
      activePhoto = (activePhoto + delta + galleryPhotos.length) % galleryPhotos.length;
      openLightbox(activePhoto);
    }

    function thumbSrc(src) {
      return src.replace('/media/', '/media/thumbs/');
    }

    // Build thumbs
    thumbsCol.innerHTML = galleryPhotos.map((entry, index) => `
      <button type="button" data-index="${index}">
        <img src="${thumbSrc(entry.src)}" alt="${entry.caption}" loading="lazy" />
      </button>
    `).join('');

    thumbsCol.querySelectorAll('button').forEach((btn) => {
      btn.addEventListener('click', () => {
        const index = Number(btn.dataset.index);
        if (isMobile()) {
          openLightbox(index);
        } else {
          activePhoto = index;
          updateViewer(index);
        }
      });
    });

    document.getElementById('lb-close').addEventListener('click', closeLightbox);
    document.getElementById('lb-prev').addEventListener('click', () => lbMove(-1));
    document.getElementById('lb-next').addEventListener('click', () => lbMove(1));

    lightbox.addEventListener('click', (e) => {
      if (e.target === lightbox) closeLightbox();
    });

    document.addEventListener('keydown', (e) => {
      if (!lightbox.classList.contains('open')) return;
      if (e.key === 'Escape') closeLightbox();
      if (e.key === 'ArrowLeft') lbMove(-1);
      if (e.key === 'ArrowRight') lbMove(1);
    });

    // Init desktop viewer with first photo
    updateViewer(0);
  </script>
</body>
</html>
