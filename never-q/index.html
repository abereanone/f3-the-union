<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Never Q Report</title>
  <link rel="stylesheet" href="../style.css" />
  <style>
    body {
      max-width: 980px;
      font-size: 16.5px;
    }

    .top-nav {
      display: flex;
      gap: 1.5rem;
      align-items: center;
      margin-bottom: 1rem;
      font-weight: 600;
      background: #fff;
      flex-wrap: wrap;
    }

    .top-nav a {
      color: #1f3b6d;
      text-decoration: none;
    }

    .top-nav a:hover,
    .top-nav a:focus {
      text-decoration: underline;
    }

    .meta {
      color: #555;
      font-size: 0.9rem;
      margin-bottom: 1rem;
    }

    .table-wrap {
      overflow-x: auto;
      border: 1px solid #ddd;
      border-radius: 4px;
    }

    table {
      width: 100%;
      border-collapse: collapse;
      font-size: 1rem;
      min-width: 680px;
    }

    th,
    td {
      border: 1px solid #ddd;
      padding: 0.55rem 0.65rem;
      text-align: left;
      vertical-align: middle;
    }

    th {
      background: #d9e3f7;
      color: #1f3b6d;
      font-weight: 800;
    }

    th button {
      background: none;
      border: 0;
      color: inherit;
      cursor: pointer;
      font: inherit;
      font-weight: inherit;
      margin: 0;
      padding: 0;
      text-align: inherit;
      width: 100%;
    }

    th button:hover,
    th button:focus {
      text-decoration: underline;
    }

    tbody tr:nth-child(even) {
      background: #f7ebe7;
    }

    .person-name {
      font-weight: 800;
    }

    .bds-count {
      width: 8rem;
    }

    .status {
      display: inline-block;
      border-radius: 999px;
      padding: 0.15rem 0.45rem;
      background: #ffe9d2;
      color: #6a3b00;
      font-size: 0.85rem;
      font-weight: 700;
      white-space: nowrap;
    }

    .muted {
      color: #777;
    }

    @media (max-width: 640px) {
      body {
        margin: 1rem;
        font-size: 14px;
      }

      .top-nav {
        gap: 0.85rem;
        font-size: 0.9rem;
      }

      h1 {
        font-size: 1.7rem;
      }

      .meta {
        font-size: 0.8rem;
      }

      table {
        font-size: 0.78rem;
        min-width: 560px;
      }

      th,
      td {
        padding: 0.4rem 0.35rem;
      }

      .status {
        font-size: 0.72rem;
        padding: 0.12rem 0.35rem;
      }
    }
  </style>
</head>
<body>
  <div id="top-nav"></div>

  <h1>Never Q Report</h1>
  <div id="report-meta" class="meta">Loading...</div>

  <div class="table-wrap">
    <table>
      <thead>
        <tr>
          <th><button type="button" data-sort="pax">PAX</button></th>
          <th class="bds-count"><button type="button" data-sort="bds_attended_last_90">BDs Last 90</button></th>
          <th><button type="button" data-sort="last_attended_date">Last Attended Date</button></th>
          <th><button type="button" data-sort="last_attended_ao">Last AO</button></th>
          <th><button type="button" data-sort="q_status">Q Status</button></th>
        </tr>
      </thead>
      <tbody id="report-body">
        <tr>
          <td colspan="5" class="muted">Loading...</td>
        </tr>
      </tbody>
    </table>
  </div>

  <script>
    const REPORT_URL = '/data/never-q.json';

    let reportRows = [];
    let currentSort = { key: 'bds_attended_last_90', dir: 'desc' };
    let reportInfo = { generatedAt: '', windowDays: 90 };

    function formatGeneratedAt(value) {
      if (!value) return 'unknown';

      const date = new Date(value);
      if (Number.isNaN(date.getTime())) return value;

      return date.toLocaleString(undefined, {
        year: 'numeric',
        month: '2-digit',
        day: '2-digit',
        hour: '2-digit',
        minute: '2-digit',
        hour12: true
      });
    }

    function formatDate(value) {
      if (!value) return '';

      if (!/^\d{4}-\d{2}-\d{2}$/.test(value)) return value;

      const [year, month, day] = value.split('-').map(Number);
      return `${month}/${day}/${year}`;
    }

    function setText(cell, value) {
      cell.textContent = value ?? '';
    }

    function compareRows(a, b, key) {
      if (key === 'bds_attended_last_90') {
        return Number(a[key] || 0) - Number(b[key] || 0);
      }

      if (key === 'last_attended_date') {
        return String(a[key] || '').localeCompare(String(b[key] || ''));
      }

      return String(a[key] || '').localeCompare(String(b[key] || ''), undefined, {
        numeric: true,
        sensitivity: 'base'
      });
    }

    function sortedRows(rows) {
      return rows.slice().sort((a, b) => {
        const order = compareRows(a, b, currentSort.key);

        if (order !== 0) {
          return currentSort.dir === 'asc' ? order : -order;
        }

        return String(a.pax || '').localeCompare(String(b.pax || ''), undefined, {
          sensitivity: 'base'
        });
      });
    }

    function updateSortLabels() {
      document.querySelectorAll('button[data-sort]').forEach((button) => {
        const label = button.dataset.label || button.textContent.replace(/\s\((asc|desc)\)$/u, '');
        button.dataset.label = label;

        button.textContent = button.dataset.sort === currentSort.key
          ? `${label} (${currentSort.dir})`
          : label;
      });
    }

    function updateMeta(visibleCount) {
      const meta = document.getElementById('report-meta');

      meta.textContent =
        `${visibleCount} PAX have never Q’d and attended at least one BD in the last ${reportInfo.windowDays} days. ` +
        `Last refreshed: ${formatGeneratedAt(reportInfo.generatedAt)}.`;
    }

    function renderReport() {
      const rows = sortedRows(reportRows);

      updateSortLabels();
      renderRows(rows);
      updateMeta(rows.length);
    }

    function renderRows(rows) {
      const body = document.getElementById('report-body');
      body.innerHTML = '';

      if (!rows.length) {
        const tr = document.createElement('tr');
        const td = document.createElement('td');

        td.colSpan = 5;
        td.className = 'muted';
        td.textContent = 'No Never Q report data found.';

        tr.appendChild(td);
        body.appendChild(tr);
        return;
      }

      rows.forEach((entry) => {
        const tr = document.createElement('tr');

        const pax = document.createElement('td');
        const bds = document.createElement('td');
        const lastDate = document.createElement('td');
        const lastAo = document.createElement('td');
        const status = document.createElement('td');
        const statusBadge = document.createElement('span');

        pax.className = 'person-name';
        bds.className = 'bds-count';
        statusBadge.className = 'status';

        setText(pax, entry.pax);
        setText(bds, Number(entry.bds_attended_last_90 || 0).toLocaleString());
        setText(lastDate, formatDate(entry.last_attended_date));
        setText(lastAo, entry.last_attended_ao || '');
        setText(statusBadge, entry.q_status || 'Never Q');

        status.appendChild(statusBadge);

        tr.append(pax, bds, lastDate, lastAo, status);
        body.appendChild(tr);
      });
    }

    async function init() {
      const response = await fetch(REPORT_URL);

      if (!response.ok) {
        throw new Error(`Unable to load Never Q report: ${response.status}`);
      }

      const report = await response.json();

      reportRows = Array.isArray(report.data) ? report.data.slice() : [];

      reportInfo = {
        generatedAt: report.generated_at,
        windowDays: report.window_days || 90
      };

      renderReport();
    }

    document.querySelector('thead').addEventListener('click', (event) => {
      const button = event.target.closest('button[data-sort]');
      if (!button) return;

      const key = button.dataset.sort;

      if (currentSort.key === key) {
        currentSort.dir = currentSort.dir === 'asc' ? 'desc' : 'asc';
      } else {
        currentSort = {
          key,
          dir: key === 'bds_attended_last_90' || key === 'last_attended_date' ? 'desc' : 'asc'
        };
      }

      renderReport();
    });

    init().catch((err) => {
      document.getElementById('report-meta').textContent = 'Unable to load Never Q report data.';
      document.getElementById('report-body').innerHTML =
        '<tr><td colspan="5" class="muted">Unable to load data.</td></tr>';

      console.error(err);
    });
  </script>

  <script src="/shared/top-nav.js"></script>
</body>
</html>
